name: channel_emulation
description: CUDA channel emulator with file-based and ZMQ CIR sources

tests:
  unit:
    enabled: true
    command: |
      pytest cuda_emulator/tests/unit -v
      pytest file_loader/tests/unit -v
      pytest zmq_loader/tests/unit -v
  integration:
    enabled: true
    command: "tests/integration/run_integration.sh"

build:
  enabled: false
  command: ""
